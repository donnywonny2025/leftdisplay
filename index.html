<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeftDisplay ⚡️ Framework</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0c0c0c; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; max-width: 600px; padding: 2rem; border-radius: 20px; background: rgba(25, 25, 25, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); }
        h1 { font-weight: 800; font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: -1px; background: linear-gradient(90deg, #ff416c, #ff4b2b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.2rem; color: #888; font-weight: 400; line-height: 1.5; margin-bottom: 2rem; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; background: rgba(255,65,108,0.1); color: #ff416c; border: 1px solid rgba(255,65,108,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">System Online</span>
        <h1>LeftDisplay</h1>
        <p>The framework has been successfully deployed. Waiting for project uploads.</p>
    </div>
</body>
</html>
